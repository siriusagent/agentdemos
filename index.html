<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Demos — Sirius Gallery</title>
<meta name="description" content="A gallery of interactive demos and artifacts built by SiriusAgent — zero-dependency, in the browser." />
<link rel="stylesheet" href="gallery.css" />
</head>
<body>
<header class="hero">
  <div class="hero-inner">
    <p class="eyebrow">SiriusAgent</p>
    <h1>Agent Demos</h1>
    <p class="tagline">A growing gallery of interactive demos, clones, and research artifacts — built zero-dependency, and runnable straight in the browser.</p>
  </div>
</header>

<main class="grid" id="grid">
  <!-- Cards are injected from the manifest below. -->
</main>

<footer class="foot">
  <p>Built with <a href="https://github.com/siriusagent/agentdemos">SiriusAgent</a> · static, no build step</p>
</footer>

<script>
/* Single source of truth. Add a new demo = add one entry here. status:"live" renders a clickable card; "draft" renders a dimmed, non-linked card. */
const EXHIBITS = [
  {
    slug: "interactive-3d-receipt",
    title: "Interactive 3D Receipt",
    blurb: "A draggable hanging paper receipt driven by a custom XPBD cloth engine — real-time folds, shadows, and a skeuomorphic Receipt Lab control surface.",
    tags: ["WebGL", "Physics", "XPBD"],
    accent: "#ffb454",
    status: "live"
  },
  {
    slug: "trace-cards-plus",
    title: "Trace Cards+",
    blurb: "A 3D wireframe trace-sculpture lab — stacked translucent cards, orbiting traced geometry, bloom, and audio reactivity. A clone-and-exceed of Whitespace's Trace Cards.",
    tags: ["WebGL", "Three.js", "Generative"],
    accent: "#0BE0A0",
    status: "live"
  },
  {
    slug: "apple-homepage-clone",
    title: "Apple Homepage Clone",
    blurb: "A faithful rebuild of the Apple homepage — layout, typography, and responsive structure recreated from scratch.",
    tags: ["Clone", "CSS", "Responsive"],
    accent: "#e8e8ed",
    status: "draft"
  }
];

const grid = document.getElementById("grid");
for (const ex of EXHIBITS) {
  const live = ex.status === "live";
  const tag = live ? "a" : "div";
  const card = document.createElement(tag);
  card.className = "card" + (live ? "" : " card--draft");
  if (live) card.href = "research/" + ex.slug + "/";
  card.style.setProperty("--accent", ex.accent);
  card.innerHTML =
    '<div class="card-top">' +
      '<span class="dot"></span>' +
      (live ? '<span class="status status--live">Live</span>' : '<span class="status status--draft">Coming soon</span>') +
    '</div>' +
    '<h2>' + ex.title + '</h2>' +
    '<p>' + ex.blurb + '</p>' +
    '<div class="tags">' + ex.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>' +
    (live ? '<span class="go">Open demo &rarr;</span>' : '<span class="go go--muted">In progress</span>');
  grid.appendChild(card);
}
</script>
</body>
</html>
