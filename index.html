<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive 3D Hanging Receipt</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main>
  <section class="stage">
    <canvas id="scene" aria-label="Interactive 3D hanging receipt cloth simulation"></canvas>
    <div class="badge" id="statsBadge">XPBD Modular Physics · 35 × 75</div>
    
    <div class="control-panel">
      <label>Light Dir</label>
      <div class="knob-container" id="lightKnob" aria-label="Drag to rotate light direction">
        <div class="knob-dial" id="knobDial"></div>
      </div>
    </div>
  </section>
  <div class="hint">Grab and drag the receipt. The new physics engine prevents crumpling and shearing.</div>
  <nav style="position:fixed;top:12px;right:14px;z-index:50;font:600 11px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.08em">
    <a href="research/trace-cards-plus/" style="color:#0BE0A0;text-decoration:none;padding:7px 12px;border:1px solid rgba(11,224,160,.4);border-radius:8px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px)">TRACE&nbsp;CARDS+&nbsp;&rarr;</a>
  </nav>
</main>
<script type="module" src="js/main.js?v=999"></script>
</body>
</html>
